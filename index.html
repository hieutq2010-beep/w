<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Lịch Sử 10 - Tổ 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="start-screen" class="screen active">
            <h1>EZ SỬ HAHAHA</h1>
            <p>Bộ câu hỏi trắc nghiệm CỰC BÁ </p>
            <button id="start-btn">Bắt đầu 😍</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="header">
                <div class="progress-info">
                    <span>Câu hỏi: <span id="current-idx">1</span>/110</span>
                    <span>Đúng: <span id="score-count">0</span></span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
            </div>
            
            <div class="question-container">
                <h2 id="question-text">Đang tải câu hỏi...</h2>
                <div id="options-list" class="options-grid"></div>
            </div>

        
        </div>

        <div id="result-screen" class="screen">
            <h1>KẾT QUẢ</h1>
            <div class="final-score" id="final-result">0/110</div>
            <p id="feedback-text"></p>
            <button onclick="location.reload()">Làm lại bài</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
